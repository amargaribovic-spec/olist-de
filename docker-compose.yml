services:
  postgres:
    image: postgres:16
    container_name: olist_postgres
    environment:
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
      POSTGRES_DB: olist
    ports:
      - "5544:5432"   # 5432/5433 are used by local Postgres instances, so expose on 5544
    volumes:
      - olist_pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: olist_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  olist_pgdata:
